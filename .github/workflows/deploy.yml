# OraBooks Production Deploy
#
# Triggers:
#   - Push to main             → build & deploy to production
#   - Push tag v*              → build & deploy to production
#   - Manual (workflow_dispatch)
#
# Required secrets (SFTP):
#   DEPLOY_HOST       – SFTP hostname (e.g. sftp.example.com)
#   DEPLOY_PORT       – SFTP port (default 22)
#   DEPLOY_USER       – SFTP username
#   DEPLOY_KEY        – SSH private key (base64 encoded PEM)
#   DEPLOY_TARGET_DIR – Remote path to wp-content/plugins/OraBooks Lean MVP/
#
# Optional secrets (cache invalidation — set one per host):
#   Kinsta:
#     KINSTA_API_TOKEN      – API key from MyKinsta > Company settings > API Keys
#     KINSTA_ENVIRONMENT_ID – Environment UUID (from MyKinsta site URL)
#   WP Engine:
#     WPE_API_USERNAME      – API username from User Portal > API Credentials
#     WPE_API_PASSWORD      – API password
#     WPE_INSTALL_ID        – Install UUID (from WP Engine portal URL)

name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (skip actual deploy)'
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OraBooks\ Lean\ MVP/orabooks-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: OraBooks\ Lean\ MVP/orabooks-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build UI
        run: npm run build
        env:
          CI: true

      - name: Verify deploy manifest
        run: |
          if [ ! -f ../assets/react/deploy-manifest.json ]; then
            echo "ERROR: deploy-manifest.json not found. Build may have failed."
            exit 1
          fi
          echo "Build manifest:"
          cat ../assets/react/deploy-manifest.json

      - name: Deploy via SFTP
        if: ${{ !inputs.dry_run }}
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          USER: ${{ secrets.DEPLOY_USER }}
          KEY: ${{ secrets.DEPLOY_KEY }}
          TARGET: ${{ secrets.DEPLOY_TARGET_DIR }}
        run: |
          # Decode SSH key
          echo "$KEY" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Rsync-like sync over SSH using tar + ssh
          echo "--- Deploying to $HOST:$TARGET ---"
          cd ../assets/react

          tar czf /tmp/deploy-bundle.tar.gz \
            --exclude=deploy-manifest.json \
            .

          scp -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            -P "$PORT" \
            -i /tmp/deploy_key \
            /tmp/deploy-bundle.tar.gz \
            "$USER@$HOST:/tmp/orabooks-deploy.tar.gz"

          ssh -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            -p "$PORT" \
            -i /tmp/deploy_key \
            "$USER@$HOST" \
            "mkdir -p '$TARGET/assets/react' && \
             tar xzf /tmp/orabooks-deploy.tar.gz -C '$TARGET/assets/react' && \
             rm /tmp/orabooks-deploy.tar.gz && \
             echo 'Deploy complete: $(date)'"

          rm /tmp/deploy_key /tmp/deploy-bundle.tar.gz
          echo "--- Deploy finished ---"

      # ---------------------------------------------------------------------------
      # Cache Invalidation (optional — only runs if the relevant secrets are set)
      # ---------------------------------------------------------------------------

      - name: Purge Kinsta cache
        if: ${{ !inputs.dry_run && secrets.KINSTA_API_TOKEN != '' && secrets.KINSTA_ENVIRONMENT_ID != '' }}
        env:
          KINSTA_TOKEN: ${{ secrets.KINSTA_API_TOKEN }}
          KINSTA_ENV_ID: ${{ secrets.KINSTA_ENVIRONMENT_ID }}
        run: |
          echo "--- Purging Kinsta cache for environment $KINSTA_ENV_ID ---"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.kinsta.com/v2/sites/environments/${KINSTA_ENV_ID}/clear-cache" \
            -H "Authorization: Bearer $KINSTA_TOKEN" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "202" ]; then
            OPERATION_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('operation_id',''))" 2>/dev/null)
            echo "Kinsta cache purge started. Operation ID: $OPERATION_ID"
          else
            echo "Warning: Kinsta cache purge returned HTTP $HTTP_CODE"
            echo "$BODY"
          fi
          echo "--- Kinsta cache purge finished ---"

      - name: Purge WP Engine cache
        if: ${{ !inputs.dry_run && secrets.WPE_API_USERNAME != '' && secrets.WPE_API_PASSWORD != '' && secrets.WPE_INSTALL_ID != '' }}
        env:
          WPE_USER: ${{ secrets.WPE_API_USERNAME }}
          WPE_PASS: ${{ secrets.WPE_API_PASSWORD }}
          WPE_INSTALL: ${{ secrets.WPE_INSTALL_ID }}
        run: |
          echo "--- Purging WP Engine cache for install $WPE_INSTALL ---"
          AUTH=$(echo -n "$WPE_USER:$WPE_PASS" | base64 -w0)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.wpengineapi.com/v1/installs/${WPE_INSTALL}/caches/all" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "204" ]; then
            echo "WP Engine cache purged successfully."
          else
            echo "Warning: WP Engine cache purge returned HTTP $HTTP_CODE"
            echo "$BODY"
          fi
          echo "--- WP Engine cache purge finished ---"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed. Check the logs above for details."
