openapi: 3.0.3
info:
  title: OraBooks SL-304 Fiscal Period API
  version: 1.0.0
servers:
  - url: /wp-json/api
paths:
  /fiscal-periods:
    get:
      summary: List fiscal periods
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [OPEN, SOFT_CLOSED, HARD_CLOSED]
        - in: query
          name: year
          schema:
            type: integer
        - in: query
          name: month
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paged fiscal periods
    post:
      summary: Create fiscal period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FiscalPeriodCreate"
      responses:
        "200":
          description: Created
        "422":
          description: Duplicate or overlapping fiscal period
  /fiscal-periods/{id}:
    get:
      summary: Get fiscal period
      parameters:
        - $ref: "#/components/parameters/PeriodId"
      responses:
        "200":
          description: Fiscal period
        "404":
          description: Not found or cross-tenant access blocked
  /fiscal-periods/{id}/close:
    post:
      summary: Close fiscal period
      parameters:
        - $ref: "#/components/parameters/PeriodId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [closeType]
              properties:
                closeType:
                  type: string
                  enum: [soft, hard]
                note:
                  type: string
      responses:
        "200":
          description: Closed
        "403":
          description: Owner/Admin permission required
        "409":
          description: Period is not open or transition is illegal
  /fiscal-periods/{id}/reopen:
    post:
      summary: Reopen soft-closed fiscal period
      parameters:
        - $ref: "#/components/parameters/PeriodId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Reopened
        "403":
          description: Owner/Admin permission required
        "409":
          description: Only soft-closed periods can be reopened here
  /fiscal-periods/{id}/override-reopen:
    post:
      summary: Super Admin override reopen for hard-closed fiscal period
      parameters:
        - $ref: "#/components/parameters/PeriodId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [justification]
              properties:
                justification:
                  type: string
      responses:
        "200":
          description: Override reopened
        "403":
          description: Super Admin permission required
        "422":
          description: Justification missing
components:
  parameters:
    PeriodId:
      in: path
      name: id
      required: true
      schema:
        type: integer
  schemas:
    FiscalPeriodCreate:
      type: object
      required: [periodName, periodStart, periodEnd]
      properties:
        periodType:
          type: string
          enum: [MONTH, QUARTER, FISCAL_YEAR]
          default: MONTH
        periodName:
          type: string
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
    FiscalPeriod:
      type: object
      properties:
        id:
          type: integer
        org_id:
          type: integer
        period_type:
          type: string
        period_name:
          type: string
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        status:
          type: string
          enum: [OPEN, SOFT_CLOSED, HARD_CLOSED]
